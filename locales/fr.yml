speakers:
  heading: Intervenants
  role: Intervenant
  jlrigau:
    bio: Ingénieur et coach en transformation AI-native. J’aide les organisations et les équipes engineering à faire évoluer leurs plateformes et leurs workflows de delivery pour intégrer durablement les systèmes multi-agents et les pratiques de développement agentiques.
    qr_alt: QR code du profil LinkedIn de Jean-Louis Rigau
  emmanuelsciara:
    bio: Agent Lead et ingénieur AI-native. J'interviens sur la stratégie d'entreprise, le déploiement et le coaching de l'utilisation des coding agents. Spécialiste Claude Code.
    qr_alt: QR code du profil LinkedIn d'Emmanuel Sciara

evolution:
  heading: Les 8 étapes du développement IA
  stages:
    zero: IA nulle ou quasi nulle
    ide_assistant: Assistant IDE avec permissions
    yolo: Agent IDE en mode YOLO
    wide_ide: Agent IDE en mode large
    cli_agent: Agent CLI en session unique
    multi_cli: Agent CLI en multi-sessions
    hand_managed: 10+ agents, pilotés à la main
    orchestrator: Construire un orchestrateur
  copy_label: Changement de pratique
  lede: D'une requête à un assistant vers la gestion d'un système de delivery.
  bullets:
    early: Les premières étapes améliorent le flux individuel.
    middle: Les étapes intermédiaires augmentent le débit (CLI).
    late: Les dernières étapes créent un enjeu de coordination.
    gastown: Gastown entre en jeu quand le pilotage manuel n'est plus gérable.
  takeaway: Le développement avec l'IA évolue de l'assistance individuelle vers la coordination organisationnelle.

creator:
  photo_caption: "Photo : Bram Cymet, CC BY-NC 2.0"
  copy_label: De la pratique à l'organisation
  lede: Steve Yegge cadre la bascule de l'utilisation individuelle des agents de code au delivery logiciel AI-native.
  vibe:
    desc: Developpement de logiciel de qualité production avec des agents de coding IA.
  gastown:
    desc: Un modèle opérationnel pour coordonner de nombreux agents sur des projets réels.
  beads:
    desc: Un registre de travail basé sur Git pour workflows d'ingénierie agentiques.
  cover_caption: "Couverture : IT Revolution / Simon & Schuster"

gastown:
  heading: "Gastown : un système de delivery urbanisé"
  town:
    title: Town
    strong: Quartier général agentique
    desc: Un espace opérationnel séparé où vivent orchestration, identité, mail et traçage du travail.
  mayor:
    title: Mayor
    strong: Coordination
    desc: "C'est le point d'entrée : absorbe le bruit des workers et transforme l'intention en travail coordonné."
  rigs:
    title: Rigs (Tour de forage)
    strong: Usines projets
    desc: Polecats, Crew, Witness et Refinery opèrent directement sur des repositories.
  copy_label: La ville comme modèle opérationnel
  lede: Gastown rend le vibe coding opérationnel sans nier le chaos.
  bullets:
    identities: Les agents deviennent des workers visibles, avec une identité.
    beads: Les beads fournissent un registre du travail, de la mémoire, du mail et de la provenance, avec Git comme backend.
    convoys: Les convoys suivent le delivery ; les Polecats exécutent.
    supervision: Witness et Refinery évitent le chaos du merge.
  takeaway: Gastown rend l'utilisation des agents de code observable et coordonnée.

demo:
  heading: Application de démo
  desc: "Exemple de delivey réaliste : application CRUD de Contract Lifecycle Management servant de cible de delivery réaliste."
  bullets:
    stack: "Stack : frontend React/Vite, backend Express/TypeScript et base SQLite."
    baseline: Gastown travaille sur un repository forké, donc la démo repart d'une baseline propre.
    real: "La démo est réelle : le résultat peut différer du plan."
  image_alt: État initial d'Agreement Hub
  flow_label: Déroulé démo
  flow_start: "Démarrer la boucle : ouvrir Agreement Hub → montrer l'état courant → demander au Mayor."
  flow_next: À partir d'ici, chaque signal live des workers indique ce qu'il faut observer.
  open_app: Ouvrir l'app ↗
  copy_prompt: Copier le prompt

break:
  heading: Pourquoi les workflows single-agent cassent
  core:
    label: Agent unique
    strong: Très bon assistant local
    desc: Un seul contexte, un seul fil d'exécution, une seule branche de travail.
  cards:
    context:
      title: Saturation du contexte
      desc: Les contraintes importantes disparaissent  la session grandit.
    sequential:
      title: Exécution séquentielle
      desc: Le débit est limité par une seule boucle de worker.
    coordination:
      title: Pas de mécanisme de coordination
      desc: Les dépendances et les responsabilités restent implicites.
    merge:
      title: Pression sur le merge
      desc: Les changements parallèles deviennent difficiles à intégrer proprement.
    supervision:
      title: Pas de supervision opérationnelle
      desc: Le travail bloqué devient difficile à observer et à récupérer.
  panel_label: Problème
  panel_desc: le développement avec IA se fait localement, alors que le delivery logiciel est organisationnel.
  bullets:
    context: Les Context Windows ne modélisent pas les dépendances.
    sequential: Le travail séquentiel limite le débit.
    parallel: Le travail parallèle crée une pression sur l'intégration.
    supervision: La supervision devient un sujet de premier ordre.
  takeaway: Le delivery logiciel est organisationnel. Le goulot devient la coordination.

organizes:
  heading: Gastown organise le travail, pas les prompts
  input:
    label: Entrée
    strong: Intention humaine
    desc: Une demande en langage naturel, incomplète par construction.
  layer:
    label: Couche d'organisation
    strong: Gastown structure le delivery
    mayor: planifie et coordonne.
    beads: rendent le travail adressable.
    convoys: suivent les flux de delivery.
    witness_refinery: gardent l'exécution observable.
    polecats: font le travail.
  output:
    label: Sortie
    strong: Delivery observable
    desc: Statuts, dépendances, responsabilités, progression et flux de merge deviennent inspectables.
  panel_label: Réponse
  panel_desc: Gastown transforme l'intention en objets de delivery partagés.
  bullets:
    mayor: Le Mayor sépare planification et exécution.
    beads: Beads et convoys rendent le travail adressable et traçable.
    witness: Witness et Refinery rendent la supervision et la convergence visibles.
    polecats: Les Polecats exécutent.
  takeaway: Le passage à l'échelle vient de la coordination partagée, pas de prompts plus gros.
  live_signal: Le Mayor transforme une demande en beads, convoys, affectations et statuts visibles.

organization:
  heading: L'organisation
  town:
    overseer: Intention et contrôle humains
    mayor: Coordination cross-rig
    deacon: Santé système
  rig:
    definition: Un repository projet avec son propre environnement d'exécution.
    crew: Workers persistants
    polecats: Workers éphémères
    witness: Supervision du rig
    refinery: Queue de merge
  panel_desc: Gastown se structure autour d'une town et d'un ou plusieurs rigs.
  bullets:
    town: La Town coordonne les repositories.
    rig: Chaque Rig cible une vraie codebase.
    workers: Les Crew sont persistants; les Polecats sont des workers d'exécution jetables.
    roles: Witness et Refinery opèrent au niveau du rig.
  takeaway: Gastown sépare coordination, exécution, supervision et intégration.
  live_signal: Identifier le rig, le crew persistant et les workers jetables attachés au repository.

beads:
  heading: "Beads : découpage du travail & dépendances"
  nodes:
    foundation:
      label: Phase 0 — Fondations
      strong: Enrichissement schéma · type RiskFinding · wrapper LLM
    uc5:
      strong: Bibliothèque de clauses
      em: Template réutilisable
    uc3:
      strong: Workflow d'approbation
      em: État et historique
    uc1:
      strong: Générateur de clauses
      em: Avec sauvegarde
    uc2:
      strong: Revue de risques
      em: Persiste les constats
    uc4:
      label: Use Case 4 — dernier kilomètre
      strong: Recherche / Intelligence
      em: Utilise schéma, métadonnées et constats
  dependencies:
    library: Clauses générées sauvegardées
    risk: Risque / GDPR nécessitent des constats persistés
  critical_path: Chemin critique
  panel_desc: Les beads transforment un besoin en travail exécutable, avec ordre, responsabilités et statut.
  bullets:
    dependencies: Les dépendances exposent le chemin critique.
    ready: Le travail qui est prêt peut être exécuté immédiatement.
    blocked: Le travail bloqué devient visible au lieu de rester implicite.
    hooks: Les hooks gardent les workers connectés aux affectations actives.
  takeaway: Les beads montrent ce qui peut démarrer maintenant, ce qui est bloqué, et pourquoi.
  live_signal: Création des beads, statut ready/blocked, graphe de dépendances et hook courant.

convoys:
  heading: "Convoys : flux de delivery"
  steps:
    step0: Étape 0
    step1: Étape 1
    step2: Étape 2
    step3: Étape 3
  phase:
    label: 🚚 Convoy Phase 0
    strong: Fondations
    em: socle partagé · débloque les Use Cases 1-5
  uc5:
