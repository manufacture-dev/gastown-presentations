polecats:
  heading: "Polecats : exécution parallèle"
  assignments:
    furiosa_1: Fondations
    furiosa_2: Bibliothèque de clauses
    furiosa_3: Revue de risques
    nux: Workflow d'approbation contrat
    slit_1: Générateur de clauses
    slit_2: Recherche / Intelligence MVP
  flow:
    request: Une demande produit
    beads: Beads cadrés
    workers: Workers d'exécution isolés (Polecats)
    delivery: Delivery coordonné
  panel_desc: Le Mayor assigne des beads cadrés à des Polecats isolés, chacun dans son contexte et sa branche.
  bullets:
    spawned: Lancés à la demande.
    isolated: Les affectations de travail restent isolées entre elles.
    disappear: Les Polecats disparaissent après livraison.
    parallelism: La parallélisation augmente le débit, pas le chaos.
  takeaway: Les Polecats scalent l'exécution via des contextes isolés.
  live_signal: Plusieurs Polecats, branches, commits et statuts de delivery en parallèle.

supervision:
  heading: La supervision garde l'exécution opérationnelle
  hq_label: Chaîne de surveillance HQ
  mayor: Coordonne le travail
  deacon: Surveillance de la town · cycle de vie · reprise
  daemon: battement mécanique
  boot: Vérifie la santé du Deacon
  dogs: Helpers du Deacon
  rig_label: Boucle opérationnelle du rig
  crew: Workers persistants
  witness: Surveille les Polecats · détecte le travail bloqué · relance la reprise
  polecats: Implémentent les beads
  refinery: Merge queue · convergence delivery
  panel_desc: La supervision Gastown est organisée en couches, pas autour d'un watcher unique.
  bullets:
    daemon: Le Daemon réveille le Boot pour vérifier la santé.
    deacon: Le Deacon garde la town en bonne santé.
    witness: Le Witness maintient l'exécution du rig.
    refinery: la Refinery maintient la convergence.
  takeaway: La supervision rend l'exécution distribuée opérationnelle.
  live_signal: Santé du Deacon, statut du Witness, reprise des Polecats, Refinery queue et convergence du delivery.

verification:
  heading: Vérification Agreement Hub
  copy_label: Inspection locale
  desc: Nous inspectons le repository livré en lançant Agreement Hub localement et en le comparant à la version de départ.
  bullets:
    not_deployed: L'application n'est pas déployée pendant la démo.
    clone: Nous clonons le repository complet produit par Gastown.
    run: Nous lançons ce repository localement, puis le comparons à la baseline.
  question: Que va révéler l'application livrée?
  checkpoints:
    title: Use cases implémentés
    clause_generator: Générateur de clauses
    risk_reviewer: Revue de risques
    approval_workflow: Workflow d'approbation
    search: Recherche & Intelligence
    library: Bibliothèque de clauses
  flow_label: Checkpoint de vérification
  flow_start: La boucle de delivery Gastown s'arrête ici.
  flow_next: Nous clonons le repository livré, lançons Agreement Hub localement, et le comparons à la version de départ.

formulas:
  heading: Aller plus loin avec les formulas
  intro: "Une formula transforme un pattern d'orchestration en playbook répétable : étapes, inputs, gates, parallélisme et artifacts."
  example_label: Exemple
  example_desc: D'une idée vague à un plan revu et un travail prêt à devenir des beads.
  open_link: Ouvrir la formula sur GitHub
  takeaway: "Les formulas rendent l'orchestration réutilisable : le workflow devient une partie du système de delivery."
  steps:
    idea:
      label: 01 · Vous → Crew
      desc: Décrire l'idée en langage naturel; aucune structure nécessaire.
    intake:
      label: 02 · intake
      desc: L'agent structure l'idée en draft PRD.
    prd_review:
      label: 03 · prd-review
      desc: "6 polecats relisent le PRD en parallèle : exigences, gaps, ambiguïtés, faisabilité, scope et stakeholders."
    human_clarify:
      label: 04 · human-clarify
      desc: L'agent consolide les questions; l'humain répond avant la suite.
    generate_plan:
      label: 05 · generate-plan
      desc: "6 polecats conçoivent l'implémentation : API, data, UX, scale, sécurité et intégration."
    prd_align:
      label: 06 · prd-align 1-3
      desc: 3 rounds × 2 Polecats alignent le plan avec le PRD et corrigent à chaque round.
    plan_review:
      label: 07 · plan-review 1-3
      desc: "3 rounds × 2 Polecats relisent le plan : complétude, séquencement, risque, scope creep et testabilité."
    create_beads:
      label: 08 · create-beads
      desc: L'agent convertit le plan affiné en beads avec dépendances.
    verify_beads:
      label: 09 · verify-beads
      desc: 3 passes séquentielles comparent le plan aux beads et comblent les gaps.

synthesis:
  heading: Ce que Gastown change
  problem_label: Problème
  problem: Les workflows single-agent cassent quand le développement devient un enjeu de delivery.
  response_label: Réponse Gastown
  response: Transformer le delivery en modèle opérationnel distribué et supervisé.
  rows:
    context: Structurer le travail en beads, artefacts et passages de relais explicites.
    sequential: Utiliser les Polecats pour exécuter le travail indépendant en parallèle.
    coordination: Mayor, Crew et Convoys rendent responsabilités et progression visibles.
    merge: La Refinery gère la convergence au lieu de laisser l'intégration au hasard.
    supervision: Witness, Deacon et les boucles de récupération gardent l'exécution observable.

