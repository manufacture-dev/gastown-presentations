evolution:
  heading: The 8 stages of AI development practice
  stages:
    zero: Zero or near-zero AI
    ide_assistant: IDE assistant with permissions
    yolo: IDE agent in YOLO mode
    wide_ide: Wide agent inside the IDE
    cli_agent: Single CLI coding agent
    multi_cli: Multi-agent CLI workflow
    hand_managed: 10+ agents, hand-managed
    orchestrator: Building an orchestrator
  copy_label: Practice shift
  lede: The shift is from asking an assistant to operating a delivery system.
  bullets:
    early: Early stages improve individual flow.
    middle: Middle stages increase throughput with CLI agents.
    late: Late stages create a coordination problem.
    gastown: Gastown appears when hand-management stops scaling.
  takeaway: AI development evolves from individual assistance to organizational coordination.

