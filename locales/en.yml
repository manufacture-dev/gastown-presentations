gastown:
  heading: "Gastown: a town-shaped delivery system"
  town:
    title: Town
    strong: Agent headquarters
    desc: A separate operating space where orchestration, identity, mail, and work tracking live.
  mayor:
    title: Mayor
    strong: Chief of staff
    desc: "The front door: absorbs worker noise and turns intent into coordinated work."
  rigs:
    title: Rigs
    strong: Project factories
    desc: Polecats, Crew, Witness and Refinery operate around real repositories.
  copy_label: Town as operating model
  lede: Gastown makes vibe coding operational without pretending the chaos disappears.
  bullets:
    identities: Many coding agents become first-class workers with visible identities.
    beads: Beads provide the Git-backed ledger for work, memory, mail, and provenance.
    convoys: Convoys track delivery streams; Polecats execute the work.
    supervision: Witness and Refinery keep the system from turning into merge chaos.
  takeaway: Gastown turns agentic coding into observable, coordinated software delivery.

