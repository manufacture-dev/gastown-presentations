formulas:
  heading: Going further with formulas
  intro: "A formula turns an orchestration pattern into a repeatable delivery playbook: steps, inputs, gates, parallel work, and artifacts."
  example_label: Example
  example_desc: From vague idea to reviewed plan and work ready to become beads.
  open_link: Open formula on GitHub
  takeaway: "Formulas make orchestration reusable: the workflow becomes part of the delivery system."
  steps:
    idea:
      label: 01 · You → Crew
      desc: Describe your idea in natural language; no structure needed.
    intake:
      label: 02 · intake
      desc: Agent structures it into a draft PRD.
    prd_review:
      label: 03 · prd-review
      desc: "6 polecats review PRD in parallel: requirements, gaps, ambiguity, feasibility, scope and stakeholders."
    human_clarify:
      label: 04 · human-clarify
      desc: Agent presents consolidated questions; the human answers before planning continues.
    generate_plan:
      label: 05 · generate-plan
      desc: "6 polecats design the implementation in parallel: API, data, UX, scale, security and integration."
    prd_align:
      label: 06 · prd-align 1-3
      desc: 3 rounds × 2 Polecats align plan with PRD and apply fixes each round.
    plan_review:
      label: 07 · plan-review 1-3
      desc: "3 rounds × 2 Polecats review the plan itself: completeness, sequencing, risk, scope creep, testability and coherence."
    create_beads:
      label: 08 · create-beads
      desc: Agent converts the refined plan into beads with dependencies.
    verify_beads:
      label: 09 · verify-beads
      desc: 3 sequential passes compare plan to beads and fill gaps.

synthesis:
  heading: What Gastown changed
  problem_label: Problem
  problem: Single-agent workflows break when coding becomes delivery.
  response_label: Gastown response
  response: Turn delivery into a supervised, distributed operating model.
  rows:
    context: Structure work into beads, artifacts, and explicit handoffs.
    sequential: Use Polecats to execute independent work in parallel.
    coordination: Mayor, Crew and Convoys make ownership and progress visible.
    merge: Refinery manages convergence instead of leaving integration to chance.
    supervision: Witness, Deacon and recovery loops keep execution observable.

