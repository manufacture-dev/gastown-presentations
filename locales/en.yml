break:
  heading: Why single-agent workflows break
  core:
    label: Single agent
    strong: Great local assistant
    desc: One context, one thread of execution, one working branch.
  cards:
    context:
      title: Context saturation
      desc: Important constraints disappear as the session grows.
    sequential:
      title: Sequential execution
      desc: Throughput is bounded by one worker loop.
    coordination:
      title: No coordination layer
      desc: Dependencies and ownership stay implicit.
    merge:
      title: Merge pressure
      desc: Parallel changes become hard to integrate safely.
    supervision:
      title: No operational supervision
      desc: Stuck work is difficult to observe and recover.
  panel_label: Problem
  panel_desc: AI coding works locally, but software delivery is organizational.
  bullets:
    context: Context windows do not model dependencies.
    sequential: Sequential work limits throughput.
    parallel: Parallel work creates integration pressure.
    supervision: Supervision becomes a first-class concern.
  takeaway: Software delivery is organizational. The bottleneck becomes coordination.

organizes:
  heading: Gastown organizes work, not prompts
  input:
    label: Input
    strong: Human intent
    desc: Natural language request, incomplete by design.
  layer:
    label: Organization layer
    strong: Gastown structures delivery
    mayor: plans and coordinates.
    beads: make work addressable.
    convoys: track delivery streams.
    witness_refinery: keep execution observable.
    polecats: do the work.
  output:
    label: Output
    strong: Observable delivery
    desc: Status, dependencies, ownership, progress, and merge flow become inspectable.
  panel_label: Response
  panel_desc: Gastown turns intent into shared delivery objects.
  bullets:
    mayor: Mayor separates planning from execution.
    beads: Beads and convoys make work addressable and trackable.
    witness: Witness and Refinery make supervision and convergence visible.
    polecats: Polecats execute the work.
  takeaway: Scale comes from shared coordination, not bigger prompts.
  live_signal: The Mayor turns a high-level request into beads, convoys, assignments, and visible status.

organization:
  heading: The Organization
  town:
    overseer: Human intent and control
    mayor: Cross-rig coordination
    deacon: System health
  rig:
    definition: A project repository with its own execution environment.
    crew: Persistent workers
    polecats: Ephemeral workers
    witness: Rig supervision
    refinery: Merge queue
  panel_desc: Gastown is organized around a town and one or more rigs.
  bullets:
    town: The Town coordinates across repositories.
    rig: Each Rig is attached to a real codebase.
    workers: Crew members are persistent; Polecats are disposable execution workers.
    roles: Witness and Refinery are rig-level operating roles.
  takeaway: Gastown separates coordination, execution, supervision, and integration.
  live_signal: Identify the rig, the persistent crew, and the disposable workers attached to the repository.

